name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Offline regression tests for the deterministic generator (no nix needed).
      - name: generator tests
        run: python3 tools/test_nur_update.py

      - uses: cachix/install-nix-action@v27
        with:
          # Populate <nixpkgs> so the classic `nix-build default.nix` path
          # (how the NUR infra evaluates) resolves without a flake.
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Configure the public `auto-patcher` Cachix cache. With CACHIX_AUTH_TOKEN
      # set (repo Actions secret) every path built below is pushed to the cache
      # so consumers fetch binaries instead of rebuilding from source. Without
      # the token it still works as a pull substituter and simply skips pushing,
      # so CI stays green on forks / before the secret is added.
      - uses: cachix/cachix-action@v15
        with:
          name: auto-patcher
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Evaluate the flake outputs (packages, overlay, legacyPackages).
      - name: nix flake check
        run: nix flake check --show-trace

      # Build the whole set via the flake. `.#default` is a symlinkJoin that
      # depends on every package, so this compiles them all.
      - name: nix build (flake)
        run: nix build --show-trace --print-build-logs '.#default'

      # Build via default.nix too — this is the exact path the NUR community
      # infra evaluates, so keep it green independently of the flake.
      - name: nix-build (default.nix, NUR path)
        run: nix-build --no-out-link
