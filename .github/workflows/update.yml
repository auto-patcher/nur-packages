name: update package

# Event-driven, single-package update. Fired by a source repo when it pushes a
# new tag (via the reusable notify-nur workflow -> repository_dispatch), or run
# manually. Regenerates the package deterministically (no LLM), verifies it
# builds, and commits straight to the default branch.

on:
  repository_dispatch:
    types: [package-tagged]
  workflow_dispatch:
    inputs:
      repo:
        description: Source repo name in the org
        required: true
      tag:
        description: Tag to package (e.g. v1.2.3)
        required: true

concurrency:
  # Serialise per source repo; allow different repos to update in parallel.
  group: update-${{ github.event.client_payload.repo || github.event.inputs.repo }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.event.client_payload.repo || github.event.inputs.repo }}
      TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: auto-patcher
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Generate / update package
        id: gen
        run: |
          echo "Updating $REPO -> $TAG"
          python3 tools/nur_update.py set --repo "$REPO" --tag "$TAG" | tee result.json
          echo "attr=$(jq -r .attr result.json)" >> "$GITHUB_OUTPUT"

      - name: Verify it evaluates and builds
        run: |
          nix flake check --show-trace
          nix build --show-trace --print-build-logs ".#${{ steps.gen.outputs.attr }}"

      - name: Commit to the default branch
        run: |
          rm -f result.json
          if git diff --quiet && git diff --cached --quiet; then
            echo "Nothing changed for $REPO $TAG."; exit 0
          fi
          git config user.name  "auto-patcher[bot]"
          git config user.email "auto-patcher[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${REPO}: package ${TAG}"
          branch="${{ github.event.repository.default_branch }}"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "$branch" || true
            git push origin "HEAD:$branch" && exit 0
            echo "push race, retry $i"; sleep $((i*3))
          done
          echo "could not push after retries"; exit 1
