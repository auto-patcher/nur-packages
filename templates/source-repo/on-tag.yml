# Drop this into a source repo at .github/workflows/on-tag.yml as part of the
# org init process. It registers the repo with the auto-patcher NUR: on every
# tag push it asks nur-packages to (re)generate and build that repo's package.
#
# One-time setup the repo (or the org) needs:
#   - a secret NUR_DISPATCH_TOKEN that can POST repository dispatches to
#     auto-patcher/nur-packages (an org secret shared to all repos is easiest);
#   - nur-packages must allow its reusable workflows to be called by org repos
#     (Settings -> Actions -> "Access").
#
# This file is a TEMPLATE and intentionally lives outside .github/workflows in
# nur-packages so it does not run here.

name: notify NUR on tag

on:
  push:
    tags:
      - '**'

jobs:
  notify:
    uses: auto-patcher/nur-packages/.github/workflows/notify-nur.yml@main
    secrets:
      dispatch_token: ${{ secrets.NUR_DISPATCH_TOKEN }}
