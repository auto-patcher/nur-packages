# Drop this into a source repo at .github/workflows/on-tag.yml as part of the
# org init process. On every tag push it asks nur-packages to (re)generate and
# build that repo's package, authenticating with a short-lived GitHub App token
# minted at runtime — no long-lived secret lives in the repo.
#
# One-time org setup (shared to all repos that publish packages):
#   - variable AUTO_PATCHER_APP_ID  = the GitHub App's ID
#   - secret   AUTO_PATCHER_APP_KEY = the GitHub App's private key (PEM)
#   - the App installed on the org with Contents: read & write, with access to
#     nur-packages and this repo;
#   - nur-packages must allow its reusable workflows to be called by org repos
#     (Settings -> Actions -> "Access").
#
# This file is a TEMPLATE and intentionally lives outside .github/workflows in
# nur-packages so it does not run here.

name: notify NUR on tag

on:
  push:
    tags:
      - '**'

jobs:
  notify:
    uses: auto-patcher/nur-packages/.github/workflows/notify-nur.yml@main
    with:
      app_id: ${{ vars.AUTO_PATCHER_APP_ID }}
    secrets:
      app_private_key: ${{ secrets.AUTO_PATCHER_APP_KEY }}
